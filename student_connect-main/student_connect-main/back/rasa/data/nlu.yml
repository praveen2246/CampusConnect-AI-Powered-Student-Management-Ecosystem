version: "3.1"

nlu:
- intent: ask_admission_date
  examples: |
    - What is the last date for admissions?
    - When will admission close?
    - Admission deadline?
    - Until when can I apply for admission?
    - Is admission still open?
    - When do admissions end?
    - Can I still apply for this year?
    - What is the admission closing date?

- intent: ask_college_timings
  examples: |
    - What are the college timings?
    - When does college start?
    - What time does college open?
    - When do classes begin?
    - What is the daily schedule?
    - What are the working hours of the college?
    - When does the college day end?
    - What time do classes finish?

